<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimchay Design Editor</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        #password-gate { background: #020617; z-index: 9999; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <!-- Password Gate -->
    <div id="password-gate" class="fixed inset-0 flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="max-w-md w-full text-center">
            <img src="assets/logo.png" class="h-16 mx-auto mb-8 opacity-50">
            <h2 class="text-2xl font-bold mb-6 tracking-widest text-slate-400">DESIGN AUTHENTICATION</h2>
            <input type="password" id="access-key" onkeydown="if(event.key === 'Enter') checkAccess()" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-center text-xl tracking-[1em] focus:ring-2 focus:ring-emerald-500 outline-none mb-6" placeholder="••••">
            <button onclick="checkAccess()" class="w-full py-4 bg-slate-800 hover:bg-emerald-600 transition rounded-xl font-bold uppercase tracking-widest">Unlock Editor</button>
            <p id="error-msg" class="mt-4 text-red-500 font-medium opacity-0">Access Denied: Invalid Key</p>
        </div>
    </div>

    <div id="editor-content" class="opacity-0 pointer-events-none transition-opacity duration-1000">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950">
        <h1 class="text-xl font-bold tracking-widest text-emerald-400">DESIGN EDITOR</h1>
        <div class="flex gap-4">
            <a href="index.html" class="px-4 py-2 bg-slate-800 rounded hover:bg-slate-700 transition">View Live Page</a>
            <button onclick="handleLogout()" class="px-4 py-2 bg-red-900/50 text-red-200 border border-red-800 rounded hover:bg-red-800 transition">Terminate Session</button>
            <button onclick="handleSave()" class="px-6 py-2 bg-emerald-600 rounded font-bold hover:bg-emerald-500 transition shadow-lg shadow-emerald-900/20">Save Changes</button>
        </div>
    </nav>

    <main class="p-8 max-w-4xl mx-auto grid gap-12">
        
        <!-- Hero Editor -->
        <section class="bg-slate-800/50 p-8 rounded-3xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-emerald-300">Hero Section</h2>
            <div class="grid gap-6">
                <div class="flex gap-6 items-start">
                    <div class="w-1/3">
                        <label class="block text-sm text-slate-400 mb-2">Background Image</label>
                        <div class="relative group h-40 bg-slate-950 rounded-xl overflow-hidden border border-slate-700">
                            <img id="preview-hero" class="w-full h-full object-cover opacity-50">
                            <input type="file" onchange="handleImageUpload(this, 'preview-hero', 'hero')" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                            <div class="absolute inset-0 flex items-center justify-center text-xs text-slate-500 pointer-events-none group-hover:text-emerald-400 transition">Click to Upload</div>
                        </div>
                    </div>
                    <div class="w-2/3 grid gap-4">
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Main Title</label>
                            <input type="text" id="edit-hero-title" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Subtitle</label>
                            <input type="text" id="edit-hero-subtitle" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Description</label>
                    <textarea id="edit-hero-desc" rows="3" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none"></textarea>
                </div>
            </div>
        </section>

        <!-- About Editor -->
        <section class="bg-slate-800/50 p-8 rounded-3xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-emerald-300">About Section</h2>
            <div class="flex gap-6">
                <div class="w-1/3">
                    <label class="block text-sm text-slate-400 mb-2">Feature Image</label>
                    <div class="relative group h-40 bg-slate-950 rounded-xl overflow-hidden border border-slate-700">
                        <img id="preview-about" class="w-full h-full object-cover opacity-50">
                        <input type="file" onchange="handleImageUpload(this, 'preview-about', 'about')" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                        <div class="absolute inset-0 flex items-center justify-center text-xs text-slate-500 pointer-events-none group-hover:text-emerald-400 transition">Click to Upload</div>
                    </div>
                </div>
                <div class="w-2/3">
                    <label class="block text-sm text-slate-400 mb-2">Story Text</label>
                    <textarea id="edit-about-content" rows="6" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none"></textarea>
                </div>
            </div>
        </section>

        <!-- Flavor Images Editor -->
        <section class="bg-slate-800/50 p-8 rounded-3xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-emerald-300 text-center">Flavor Gallery</h2>
            <div class="grid grid-cols-4 gap-4">
                <!-- Classic -->
                <div>
                    <label class="block text-xs text-center text-slate-400 mb-2 font-bold uppercase">Classic</label>
                    <div class="relative group h-32 bg-slate-950 rounded-xl overflow-hidden border border-slate-700">
                        <img id="preview-flavor-classic" class="w-full h-full object-cover">
                        <input type="file" onchange="handleImageUpload(this, 'preview-flavor-classic', 'classic')" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                    </div>
                </div>
                <!-- Spicy -->
                <div>
                    <label class="block text-xs text-center text-slate-400 mb-2 font-bold uppercase">Spicy</label>
                    <div class="relative group h-32 bg-slate-950 rounded-xl overflow-hidden border border-slate-700">
                        <img id="preview-flavor-spicy" class="w-full h-full object-cover">
                        <input type="file" onchange="handleImageUpload(this, 'preview-flavor-spicy', 'spicy')" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                    </div>
                </div>
                <!-- Honey -->
                <div>
                    <label class="block text-xs text-center text-slate-400 mb-2 font-bold uppercase">Honey</label>
                    <div class="relative group h-32 bg-slate-950 rounded-xl overflow-hidden border border-slate-700">
                        <img id="preview-flavor-honey" class="w-full h-full object-cover">
                        <input type="file" onchange="handleImageUpload(this, 'preview-flavor-honey', 'honey')" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                    </div>
                </div>
                <!-- Chili Garlic -->
                <div>
                    <label class="block text-xs text-center text-slate-400 mb-2 font-bold uppercase">Chili Garlic</label>
                    <div class="relative group h-32 bg-slate-950 rounded-xl overflow-hidden border border-slate-700">
                        <img id="preview-flavor-chili-garlic" class="w-full h-full object-cover">
                        <input type="file" onchange="handleImageUpload(this, 'preview-flavor-chili-garlic', 'chili-garlic')" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                    </div>
                </div>
            </div>
        </section>

        <!-- Theme Editor -->
        <section class="bg-slate-800/50 p-8 rounded-3xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-emerald-300">Design Theme</h2>
            <div class="grid grid-cols-3 gap-6 text-center">
                <div>
                    <label class="block text-sm text-slate-400 mb-2 font-bold">Pechay Green</label>
                    <input type="color" id="color-primary" class="w-20 h-20 bg-transparent cursor-pointer rounded-lg overflow-hidden border-2 border-slate-600">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2 font-bold">Chili Red</label>
                    <input type="color" id="color-secondary" class="w-20 h-20 bg-transparent cursor-pointer rounded-lg overflow-hidden border-2 border-slate-600">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2 font-bold">Honey Gold</label>
                    <input type="color" id="color-accent" class="w-20 h-20 bg-transparent cursor-pointer rounded-lg overflow-hidden border-2 border-slate-600">
                </div>
            </div>
        </section>

    </main>

    </div> <!-- End editor-content -->

    <div id="toast" class="fixed bottom-8 right-8 bg-emerald-600 px-6 py-4 rounded-xl font-bold shadow-2xl opacity-0 transition-opacity pointer-events-none">
        Changes Saved Successfully!
    </div>

    <script src="app.js"></script>
    <script>
        // Stealth authentication configuration
        const _kch_auth_key_ = "S2ltY2hheTIwMjY=";
        function checkAccess() {
            const input = document.getElementById('access-key').value;
            const error = document.getElementById('error-msg');
            
            if (btoa(input) === _kch_auth_key_) {
                sessionStorage.setItem('_kch_auth_session_', 'true');
                unlockUI();
            } else {
                error.classList.replace('opacity-0', 'opacity-100');
                setTimeout(() => error.classList.replace('opacity-100', 'opacity-0'), 2000);
            }
        }

        function handleLogout() {
            sessionStorage.removeItem('_kch_auth_session_');
            window.location.replace('index.html');
        }

        function unlockUI() {
            document.getElementById('password-gate').classList.add('opacity-0', 'pointer-events-none');
            const content = document.getElementById('editor-content');
            content.classList.remove('opacity-0', 'pointer-events-none');
            content.classList.add('opacity-100');
        }

        function lockUI() {
            document.getElementById('password-gate').classList.remove('opacity-0', 'pointer-events-none');
            const content = document.getElementById('editor-content');
            content.classList.add('opacity-0', 'pointer-events-none');
            content.classList.remove('opacity-100');
        }

        // Check authentication on load
        if (sessionStorage.getItem('_kch_auth_session_') === 'true') {
            unlockUI();
        } else {
            lockUI();
        }

        const content = getStoredContent();
        let uploadedImages = {
            hero: content.hero.image,
            about: content.about.image,
            classic: content.flavors.find(f => f.id === 'classic').image,
            spicy: content.flavors.find(f => f.id === 'spicy').image,
            honey: content.flavors.find(f => f.id === 'honey').image,
            'chili-garlic': content.flavors.find(f => f.id === 'chili-garlic').image
        };

        function compressImage(file, maxWidth = 800, quality = 0.4) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const result = canvas.toDataURL('image/jpeg', quality);
                        console.log(`Image compressed: ${Math.round(result.length / 1024)}KB`);
                        resolve(result);
                    };
                };
            });
        }

        async function handleImageUpload(input, previewId, type) {
            const file = input.files[0];
            if (file) {
                // High-res for hero, ultra-lite for cards to save storage space
                let maxWidth = (type === 'hero' || type === 'about') ? 1600 : 300;
                let quality = (type === 'hero' || type === 'about') ? 0.6 : 0.4;
                const dataUrl = await compressImage(file, maxWidth, quality);
                document.getElementById(previewId).src = dataUrl;
                document.getElementById(previewId).classList.remove('opacity-50');
                uploadedImages[type] = dataUrl;
            }
        }

        function loadInputs() {
            document.getElementById('edit-hero-title').value = content.hero.title;
            document.getElementById('edit-hero-subtitle').value = content.hero.subtitle;
            document.getElementById('edit-hero-desc').value = content.hero.description;
            document.getElementById('edit-about-content').value = content.about.content;
            
            document.getElementById('color-primary').value = content.theme.primary;
            document.getElementById('color-secondary').value = content.theme.secondary;
            document.getElementById('color-accent').value = content.theme.accent;

            // Load Previews
            document.getElementById('preview-hero').src = uploadedImages.hero;
            document.getElementById('preview-about').src = uploadedImages.about;
            document.getElementById('preview-flavor-classic').src = uploadedImages.classic;
            document.getElementById('preview-flavor-spicy').src = uploadedImages.spicy;
            document.getElementById('preview-flavor-honey').src = uploadedImages.honey;
            document.getElementById('preview-flavor-chili-garlic').src = uploadedImages['chili-garlic'];
        }

        function handleSave() {
            const newContent = {
                hero: {
                    title: document.getElementById('edit-hero-title').value,
                    subtitle: document.getElementById('edit-hero-subtitle').value,
                    description: document.getElementById('edit-hero-desc').value,
                    image: uploadedImages.hero
                },
                about: {
                    content: document.getElementById('edit-about-content').value,
                    image: uploadedImages.about
                },
                theme: {
                    primary: document.getElementById('color-primary').value,
                    secondary: document.getElementById('color-secondary').value,
                    accent: document.getElementById('color-accent').value
                },
                flavors: [
                    { id: 'classic', name: 'Classic', description: content.flavors.find(f => f.id === 'classic').description, image: uploadedImages.classic },
                    { id: 'spicy', name: 'Spicy', description: content.flavors.find(f => f.id === 'spicy').description, image: uploadedImages.spicy },
                    { id: 'honey', name: 'Honey', description: content.flavors.find(f => f.id === 'honey').description, image: uploadedImages.honey },
                    { id: 'chili-garlic', name: 'Chili Garlic', description: content.flavors.find(f => f.id === 'chili-garlic').description, image: uploadedImages['chili-garlic'] }
                ]
            };
            
            if (saveContent(newContent)) {
                // Show toast
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => {
                    toast.style.opacity = '0';
                    window.location.reload(); // Reload to refresh the local state
                }, 1500);
            }
        }

        loadInputs();
    </script>
</body>
</html>
